{id:'pol',title:'Pol\u00EDtica de IA y recomendaciones',icon:'Gear',body:()=>(
<div>
<h3 className="font-bold text-lg text-primary mb-3">Pol&#237;tica de uso de inteligencia artificial</h3>
<p className="mb-3 text-sm">El uso de herramientas de IA (ChatGPT, Claude, Copilot, Gemini, etc.) est&#225; <strong>permitido y fomentado</strong> como apoyo en el desarrollo del proyecto. Sin embargo:</p>
<ol className="list-decimal pl-5 space-y-2 text-sm mb-6">
<li>El estudiante debe <strong>comprender completamente</strong> todo el c&#243;digo y los resultados producidos. La IA es un asistente, no un sustituto del aprendizaje.</li>
<li>Durante la sustentaci&#243;n oral se evaluar&#225; la capacidad del estudiante para explicar las decisiones metodol&#243;gicas, interpretar los resultados y responder preguntas sobre <strong>cualquier parte</strong> del proyecto (incluyendo la arquitectura FastAPI, los modelos Pydantic y la l&#243;gica de c&#225;lculo).</li>
<li>Copiar y pegar c&#243;digo o texto generado por IA sin comprensi&#243;n se considerar&#225; equivalente a <strong>plagio</strong> si no se puede defender en la sustentaci&#243;n.</li>
<li>Se valora positivamente que el estudiante documente c&#243;mo utiliz&#243; la IA como herramienta de apoyo (por ejemplo, en una secci&#243;n del README titulada <em>&#8220;Uso de herramientas de IA&#8221;</em>).</li>
</ol>

<h3 className="font-bold text-lg text-primary mb-3">Recomendaciones t&#233;cnicas</h3>
<h4 className="font-semibold text-sm text-secondary mt-4 mb-2"><i className="fas fa-database mr-1"></i> Sobre los datos</h4>
<ul className="list-disc pl-5 space-y-1 text-sm mb-4">
<li>Verificar que no haya valores faltantes en las series de precios. Documentar la estrategia de manejo (interpolaci&#243;n, eliminaci&#243;n, etc.).</li>
<li>Utilizar <strong>log-rendimientos</strong> por sus propiedades de aditividad temporal y estacionariedad.</li>
<li>Al descargar datos con yfinance, verificar que las columnas sean consistentes (especialmente tras actualizaciones de la librer&#237;a).</li>
</ul>
<h4 className="font-semibold text-sm text-secondary mt-4 mb-2"><i className="fas fa-server mr-1"></i> Sobre el backend FastAPI</h4>
<ul className="list-disc pl-5 space-y-1 text-sm mb-4">
<li className="text-green-700 font-semibold">&#9733;&#9733; Levantar backend y frontend como procesos separados. El frontend consume los endpoints v&#237;a HTTP.</li>
<li className="text-green-700 font-semibold">&#9733; Cache de datos externos en SQLite v&#237;a SQLAlchemy (no usar <code className="bg-gray-100 px-1 rounded">functools.lru_cache</code> que es por proceso y no sobrevive reinicios).</li>
<li className="text-green-700 font-semibold">&#9733; Manejar errores con <code className="bg-gray-100 px-1 rounded">HTTPException</code> y status codes correctos (400, 404, 422, 503).</li>
<li className="text-green-700 font-semibold">&#9733; Nunca exponer API keys en c&#243;digo fuente. <code className="bg-gray-100 px-1 rounded">BaseSettings</code> + <code className="bg-gray-100 px-1 rounded">.env</code> + <code className="bg-gray-100 px-1 rounded">.env.example</code>.</li>
<li>Probar la documentaci&#243;n autom&#225;tica en <code className="bg-gray-100 px-1 rounded">/docs</code> y <code className="bg-gray-100 px-1 rounded">/redoc</code> antes de la sustentaci&#243;n.</li>
</ul>

<h4 className="font-semibold text-sm text-secondary mt-4 mb-2"><i className="fas fa-database mr-1"></i> Sobre la persistencia y el ML</h4>
<ul className="list-disc pl-5 space-y-1 text-sm mb-4">
<li className="text-green-700 font-semibold">&#9733; Excluir el archivo <code className="bg-gray-100 px-1 rounded">.db</code> del repositorio Git (en <code className="bg-gray-100 px-1 rounded">.gitignore</code>). Crear un <code className="bg-gray-100 px-1 rounded">seed.py</code> reproducible.</li>
<li className="text-green-700 font-semibold">&#9733; Versionar el modelo serializado (<code className="bg-gray-100 px-1 rounded">model_v1.joblib</code>) y registrar la versi&#243;n en el <code className="bg-gray-100 px-1 rounded">PredictionLog</code>.</li>
<li className="text-green-700 font-semibold">&#9733; Verificar que el Singleton funciona: hacer 2 llamadas a <code className="bg-gray-100 px-1 rounded">/predict</code> y comprobar que el mensaje de carga del modelo aparece <strong>una sola vez</strong> en los logs.</li>
<li>Cuidado con el <strong>leakage temporal</strong> al entrenar: usar <code className="bg-gray-100 px-1 rounded">train_test_split(shuffle=False)</code> para series financieras.</li>
</ul>

<h4 className="font-semibold text-sm text-secondary mt-4 mb-2"><i className="fab fa-docker mr-1"></i> Sobre Docker y deploy</h4>
<ul className="list-disc pl-5 space-y-1 text-sm mb-4">
<li className="text-green-700 font-semibold">&#9733;&#9733; Probar la imagen Docker localmente antes de pushear (<code className="bg-gray-100 px-1 rounded">docker compose up</code>) para detectar dependencias faltantes en <code className="bg-gray-100 px-1 rounded">requirements.txt</code>.</li>
<li>El multi-stage es lo que reduce la imagen de ~600 MB a ~150 MB. Sin multi-stage el cold start de Render se vuelve muy lento.</li>
<li>Render free-tier <strong>duerme el servicio tras 15 min sin tr&#225;fico</strong>. Antes de la sustentaci&#243;n hacer una llamada de calentamiento (<code className="bg-gray-100 px-1 rounded">curl &lt;url&gt;/docs</code>).</li>
</ul>

<h4 className="font-semibold text-sm text-secondary mt-4 mb-2"><i className="fas fa-desktop mr-1"></i> Sobre el tablero (frontend)</h4>
<ul className="list-disc pl-5 space-y-1 text-sm mb-4">
<li>Priorizar la <strong>claridad sobre la est&#233;tica</strong>. Gr&#225;ficos legibles y navegaci&#243;n intuitiva.</li>
<li>Incluir textos explicativos o tooltips para interpretar cada visualizaci&#243;n.</li>
<li>Si se usa Streamlit: <code className="bg-gray-100 px-1 rounded">st.tabs()</code> o <code className="bg-gray-100 px-1 rounded">st.sidebar</code>. Si se usa Shiny: <code className="bg-gray-100 px-1 rounded">navbarPage()</code>.</li>
<li>El frontend debe apuntar a la URL de Render en producci&#243;n y a <code className="bg-gray-100 px-1 rounded">localhost:8000</code> en dev (configurable v&#237;a env).</li>
</ul>

<h4 className="font-semibold text-sm text-secondary mt-4 mb-2"><i className="fas fa-microphone mr-1"></i> Sobre la sustentaci&#243;n</h4>
<ul className="list-disc pl-5 space-y-1 text-sm mb-4">
<li>Demostraci&#243;n en vivo del tablero y de <code className="bg-gray-100 px-1 rounded">/docs</code>/<code className="bg-gray-100 px-1 rounded">/redoc</code> del backend deployado.</li>
<li>Cada integrante debe poder explicar <strong>cualquier secci&#243;n</strong>, no solo la que desarroll&#243;.</li>
<li>Llevar un script de demo: orden de pesta&#241;as a mostrar, llamadas concretas a hacer, escenarios de stress a aplicar.</li>
</ul>

<div className="usta-card p-4 mt-4">
<h4 className="font-semibold text-sm text-primary mb-2"><i className="fas fa-question-circle mr-1"></i> Preguntas frecuentes en la sustentaci&#243;n</h4>
<ul className="list-disc pl-5 space-y-1 text-sm text-gray-500 italic">
<li>&#191;Por qu&#233; eligieron esos activos? &#191;Qu&#233; modelo GARCH seleccionaron y por qu&#233;? &#191;C&#243;mo cambia el resultado entre EWMA y GARCH?</li>
<li>&#191;C&#243;mo validaron los datos de entrada con Pydantic? Muestre uno de los <code>@field_validator</code> personalizados.</li>
<li>&#191;Qu&#233; dependencias inyectan con <code>Depends()</code>? &#191;Por qu&#233; no pusieron la l&#243;gica directamente en la ruta?</li>
<li>&#191;D&#243;nde est&#225;n las API keys? &#191;Qu&#233; pasa si la API externa no responde?</li>
<li>&#191;C&#243;mo est&#225;n persistiendo los datos? &#191;Por qu&#233; eligieron <strong>SQLAlchemy ORM</strong> en lugar de SQL Raw? Mu&#233;strenos uno de los modelos.</li>
<li>&#191;C&#243;mo verifican que el patr&#243;n <strong>Singleton</strong> de su modelo ML no recarga el modelo en cada request?</li>
<li>Expliquen el ciclo de vida del modelo ML: &#191;c&#243;mo lo entrenan, c&#243;mo lo serializan, c&#243;mo lo cargan en memoria? &#191;Qu&#233; hay en <code>PredictionLog</code>?</li>
<li>&#191;Por qu&#233; <strong>multi-stage</strong> en el Dockerfile? &#191;Qu&#233; ahorran y qu&#233; impacta en el cold start?</li>
<li>Mu&#233;strenos la URL del backend deployado y abran <code>/docs</code>. Hagan una llamada en vivo a <code>/predict</code>.</li>
<li>&#191;Qu&#233; significa el <strong>backtesting de Kupiec</strong>? &#191;Cu&#225;l de sus tres VaR pasa el test al 95%?</li>
<li>Para <strong>Markowitz</strong>: &#191;c&#243;mo cambia el portafolio &#243;ptimo cuando se exige no negatividad? &#191;Qu&#233; activos quedan con peso cero?</li>
<li>Para <strong>renta fija</strong>: &#191;qu&#233; significa la duraci&#243;n? &#191;Cu&#225;nto se mueve el precio del bono ante un shock de +200 pb? Comparen las tres aproximaciones.</li>
<li>Para <strong>opciones</strong>: verifiquen num&#233;ricamente la paridad put-call sobre un par. &#191;Qu&#233; es vega y para qu&#233; sirve en stress testing?</li>
<li>&#191;Qu&#233; se&#241;ales est&#225; generando el sistema hoy? &#191;C&#243;mo se compara la p&#233;rdida del portafolio bajo el peor escenario de stress vs el VaR base?</li>
</ul>
</div>
</div>
)},
