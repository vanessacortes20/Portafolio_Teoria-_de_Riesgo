name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          # Variables predecibles — los tests no deben depender de FRED ni internet
          JWT_SECRET: "ci_secret_for_pytest_only"
          JWT_TTL_MINUTES: "60"
          FRED_API_KEY: ""
        run: |
          python -m pytest tests/ -v --tb=short
