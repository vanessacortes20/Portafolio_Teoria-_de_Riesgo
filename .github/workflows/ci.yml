name: CI

# Se dispara en cualquier push a main/develop y en todos los pull requests.
on:
  push:
    branches: [main, develop]
  pull_request:

# Cancela ejecuciones previas en la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pytest sobre Python 3.11.9
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          JWT_SECRET: ci-secret-do-not-use-in-prod
          FRED_API_KEY: ""
        run: pytest tests/ -v --tb=short
