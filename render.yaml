services:
  - type: web
    name: risklab-usta
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      # Versión exacta exigida por el Plan III
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Secret JWT autogenerado por Render
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL_MINUTES
        value: "60"
      # Portafolio del análisis (Plan III)
      - key: PORTFOLIO_TICKERS
        value: "NU,AMZN,SONY,XOM,WPM"
      - key: BENCHMARK_TICKER
        value: "^GSPC"
      - key: RISK_FREE_RATE_DEFAULT
        value: "0.04"
      # FRED_API_KEY se pone manualmente en el panel de Render.
      # sync: false impide que Render la sobrescriba en redeploys.
      - key: FRED_API_KEY
        sync: false
    disk:
      name: risklab-data
      mountPath: /app/data
      sizeGB: 1
