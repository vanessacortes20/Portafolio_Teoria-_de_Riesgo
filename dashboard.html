    });
  });
}



// ═══════════════════════════════════════════
//  M6 — OPTIMIZACIÓN (Markowitz)
// ═══════════════════════════════════════════
function renderM6() {
  const p = getD('portfolio'); const dReturns = getD('returns'); const tickers = state.activeTickers.filter(t => dReturns?.[t]);
  if (!p || Object.keys(p).length===0 || tickers.length<2) { noData('Faltan datos de portafolio o series'); return; }

  const wMaxS = p.Max_Sharpe; const wMinV = p.Min_Volatility;

  let corrMatrix = ''; const highCorrPairs = []; const negCorrPairs = [];
  if (p.Correlation) {
    const keys = Object.keys(p.Correlation);
    const head = `<tr><th>Tensión</th>${keys.map(k=>`<th>${k}</th>`).join('')}</tr>`;
    const rows = keys.map(k1 => {
        const cells = keys.map(k2 => {
            const v = p.Correlation[k1][k2];
            const cStr = v > 0.6 ? C.red : (v < -0.3 ? C.green : C.text);
            if (k1 !== k2 && v > 0.6 && !highCorrPairs.includes(`${k2}-${k1} (${fmt(v,2)})`)) highCorrPairs.push(`${k1}-${k2} (${fmt(v,2)})`);
            if (k1 !== k2 && v < -0.1 && !negCorrPairs.includes(`${k2}-${k1} (${fmt(v,2)})`)) negCorrPairs.push(`${k1}-${k2} (${fmt(v,2)})`);
            return `<td style="color:${cStr}">${fmt(v,2)}</td>`;
        }).join('');
        return `<tr><th>${k1}</th>${cells}</tr>`;
    }).join('');
    corrMatrix = `<table class="compare-table" style="font-size:0.85rem">${head}<tbody>${rows}</tbody></table>`;
  }

  const wHTML = (obj, title, logic) => {
    let dominantAsset = Object.keys(obj.Weights).reduce((a, b) => obj.Weights[a] > obj.Weights[b] ? a : b);
    return `<div class="card" style="flex:1;min-width:300px;padding:16px;">
        <h3 style="margin-top:0;font-size:1.05rem;color:#0F172A;">${title}</h3>
        <div style="font-size:0.9rem;color:#475569;margin-bottom:12px;">
            Retorno Anual Esperado: <strong style="color:${C.green}">${pct(obj.Return)}</strong><br/>
            Volatilidad Anual: <strong style="color:${C.red}">${pct(obj.Volatility)}</strong><br/>
            Sharpe Ratio: <strong>${fmt(obj.Sharpe,3)}</strong>
        </div>
        <div style="display:flex;height:24px;width:100%;border-radius:4px;overflow:hidden;margin-bottom:10px;">
            ${tickers.map(t=> (obj.Weights[t]||0)>0.005 ? `<div style="width:${(obj.Weights[t]||0)*100}%;height:100%;background:${TICKER_COLOR[t]};" title="${t}"></div>` : '').join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
            ${tickers.map(t=> (obj.Weights[t]||0)>0.005 ? `<div style="font-size:0.75rem;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${TICKER_COLOR[t]};margin-right:4px;"></span>${t} ${pct(obj.Weights[t]||0,1)}</div>` : '').join('')}
        </div>
        <div style="background:#f1f5f9; padding:8px; border-radius:6px; font-size:0.8rem; color:#334155;">
          <b>Activo dominante:</b> <b>${dominantAsset}</b> recibe la mayor ponderación (${pct(obj.Weights[dominantAsset],1)}). ${logic}
        </div>
    </div>`;
  };

  let corrInterp = highCorrPairs.length > 0
    ? `Atención: Los pares ${highCorrPairs.join(', ')} tienen correlación alta (>0.6), lo que significa que tienden a subir y bajar juntos. Esto reduce el beneficio de la diversificación, ya que en días de caída general ambos activos caerán simultáneamente.`
    : `La diversificación es efectiva: ningún par de activos tiene correlación superior a 0.6. Esto significa que cuando un activo cae, los demás no necesariamente lo hacen al mismo tiempo, reduciendo el riesgo total del portafolio.`;
  if (negCorrPairs.length > 0) corrInterp += ` Adicionalmente, los pares ${negCorrPairs.join(', ')} tienen correlación negativa: cuando uno sube, el otro tiende a bajar. Este comportamiento opuesto actúa como cobertura natural dentro del portafolio.`;

  setContent(`
    <h1 class="header-gradient">M6 — Optimización de Portafolio (Markowitz)</h1>
    <p class="page-subtitle">La teoría de Markowitz encuentra la combinación de activos que maximiza el retorno esperado para cada nivel de riesgo asumido (frontera eficiente).</p>

    <div class="tabs" id="m6-tabs">
      <button class="tab-btn active" onclick="switchTab('m6','graf',this)">💎 Frontera Eficiente</button>
      <button class="tab-btn"        onclick="switchTab('m6','pesos',this)">⚖️ Pesos Óptimos</button>
      <button class="tab-btn"        onclick="switchTab('m6','corr',this)">🔗 Correlaciones entre Activos</button>
    </div>
    <div id="m6-tab-graf"  class="tab-content card active" style="padding:12px">
        <div id="ch-frontier"></div>
        ${(()=>{
          const wMS = p.Max_Sharpe; const wMV = p.Min_Volatility;
          const FD = p.Frontier;
          let frontText, frontType;
          if (wMS && wMV) {
            const sharpeMin = FD?.Sharpe?.length ? Math.min(...FD.Sharpe).toFixed(2) : 'N/A';
            const sharpeMax = FD?.Sharpe?.length ? Math.max(...FD.Sharpe).toFixed(2) : 'N/A';
            const dominantMS = Object.keys(wMS.Weights).reduce((a,b) => wMS.Weights[a] > wMS.Weights[b] ? a : b);
            frontText = `De las 10,000 simulaciones (Sharpe: ${sharpeMin} – ${sharpeMax}), el portafolio de tangencia óptimo alcanza SR=${fmt(wMS.Sharpe,2)} con retorno ${pct(wMS.Return,1)} y volatilidad ${pct(wMS.Volatility,1)}. El activo dominante es ${dominantMS} (${pct(wMS.Weights[dominantMS],1)}). Los puntos interiores de la nube son ineficientes: existe alguna combinación en la frontera superior izquierda que ofrece mejor retorno al mismo riesgo, o igual retorno con menor riesgo.`;
            frontType = 'positive';
          } else {
            frontText = "Cada punto representa un portafolio con pesos aleatorios. La frontera eficiente (envolvente superior-izquierda) contiene las únicas combinaciones que maximizan el retorno esperado para cada nivel de volatilidad. Los portafolios interiores son dominados y subóptimos.";
            frontType = 'neutral';
          }
          return getInsight("Frontera Eficiente", "Visualiza decenas de mezclas en fondos. CÓMO LEERLO: La línea superior redondeada alberga los esquemas inmejorables. Combinaciones fuera o debajo de la frontera te regalan altísima volatilidad nociva por pura rentabilidad estancada en cero.", "neutral");
        })()}
    </div>
    <div id="m6-tab-pesos" class="tab-content" style="padding:0">
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;">
            ${wHTML(wMaxS, "⭐ Portafolio de Máximo Sharpe (mejor relación retorno/riesgo)", "Esta combinación maximiza el retorno obtenido por cada unidad de riesgo asumida. Es la opción más eficiente para un inversor que busca equilibrio entre rentabilidad y estabilidad.")}
            ${wHTML(wMinV, "🛡️ Portafolio de Mínima Volatilidad (máxima protección)", "Esta distribución reduce al máximo las fluctuaciones de la cartera. Ideal para perfiles conservadores que priorizan la estabilidad del capital por encima del retorno potencial.")}
        </div>
    </div>
    <div id="m6-tab-corr"  class="tab-content card" style="padding:16px;">
        <p style="font-size:.88rem;color:#475569;margin-bottom:12px"><b>Correlación:</b> va de -1 a +1. Valores cercanos a <b>+1</b> = activos que se mueven juntos. Valores cercanos a <b>-1</b> = activos que se mueven en sentido opuesto. <b>0</b> = sin relación. Para diversificar bien, se buscan correlaciones bajas o negativas entre los activos.</p>
        <details class="collapsible" open>
          <summary>📋 Matriz de correlación entre activos</summary>
          <div class="details-body" style="overflow-x:auto">${corrMatrix}</div>
        </details>
        ${getInsight("Resumen de Correlaciones", "Jamás pongas tus fichas aliadas de la mano. CÓMO LEERLO: Valores rojos próximos a +1 auguran que al momento de perder caerán hermanados a doble fondo afectando la balanza de todo tu portafolio; elige el azul.", "neutral")}
    </div>
    <div class="footer">RiskLab USTA · M6 Fronteras de Optimización</div>`);

  const F = p.Frontier; if (!F) return;
  Plotly.newPlot('ch-frontier', [
    { type:'scatter', mode:'markers', name:'Portafolios Simulados (10,000)',
      x:F.Volatility, y:F.Returns,
      marker:{ color:F.Sharpe, colorscale:'RdYlGn', size:4, opacity:0.55,
        colorbar:{title:'Sharpe Ratio', thickness:12, len:0.7} },
      text:F.Sharpe.map((s,i)=>`Vol: ${(F.Volatility[i]*100).toFixed(1)}%<br>Ret: ${(F.Returns[i]*100).toFixed(1)}%<br>Sharpe: ${fmt(s,3)}`),
      hovertemplate:'%{text}<extra></extra>'
    },
    { type:'scatter', mode:'markers+text', name:`Máx. Sharpe (SR=${fmt(wMaxS.Sharpe,2)})`,
      x:[wMaxS.Volatility], y:[wMaxS.Return],
      text:[`SR ${fmt(wMaxS.Sharpe,2)}`], textposition:'top center',
      marker:{ color:C.red, size:16, symbol:'star', line:{color:'#fff',width:1.5} }
    },
    { type:'scatter', mode:'markers+text', name:`Mín. Volatilidad (${(wMinV.Volatility*100).toFixed(1)}%)`,
      x:[wMinV.Volatility], y:[wMinV.Return],
      text:[`Vol ${(wMinV.Volatility*100).toFixed(1)}%`], textposition:'bottom center',
      marker:{ color:C.green, size:14, symbol:'diamond', line:{color:'#fff',width:1.5} }
    }
  ], { ...PB, height:480, margin:{t:50,b:50,l:70,r:20},
    xaxis:{...PB.xaxis, title:'Volatilidad Anual (%)', tickformat:'.1%'},
    yaxis:{...PB.yaxis, title:'Retorno Anual (%)', tickformat:'.1%'},
    title:{text:`Frontera Eficiente de Markowitz — ${tickers.length} Activos · 10,000 Simulaciones`,font:{size:13}},
    legend:{...PB.legend, orientation:'h', y:-0.12}
  }, PCFG);
}

//  M7 — SEÑALES Y ALERTAS

function renderM7() {
  const tickers = state.activeTickers;
  let allRows = "";
  
  let sigSell = 0; let sigBuy = 0;

  tickers.forEach(t => {
      const d = getD('signals', t);
      if (!d || !d.signals || !d.signals.length) return;
      const tc = TICKER_COLOR[t];
      d.signals.forEach(s => {
          const isBuy = s.type === "Buy";
          if (isBuy) sigBuy++; else sigSell++;
          const clr = isBuy ? '#10b981' : '#dc2626'; 
          const bg  = isBuy ? '#ecfdf5' : '#fcf3f3'; 
          const icn = isBuy ? '+ PÁNICO COMPRA' : '- PÁNICO VENTA';

          let finalExpl = '';
          const mup = s.msg.toUpperCase();
          if (mup.includes('BANDA SUPERIOR') || mup.includes('BANDA SUPERIOR')) {
              finalExpl = "El precio rompió el límite superior de desviaciones estándar permitidas. La corrección bajista ocurre como reversión a la normalidad estadística.";
          } else if (mup.includes('SOBRECOMPRA')) {
              finalExpl = "El indicador RSI señala saturación de compradores. El mercado se quedó sin fuerza para seguir subiendo, abriendo la puerta a ventas de liquidación.";
          } else if (mup.includes('SOBREVENTA')) {
              finalExpl = "El activo fue castigado excesivamente. El agotamiento de ventas sugiere que pronto habrá un rebote orgánico.";
          } else if (mup.includes('BANDA INFERIOR')) {
              finalExpl = "El precio perforó el soporte mínimo esperado, indicando un nivel de pánico que suele atraer compradores fuertes por los bajos precios.";
          } else if (mup.includes('GOLDEN CROSS') || mup.includes('CRUCE ALCISTA')) {
              finalExpl = "Las tendencias de corto plazo superaron a las de largo plazo, marcando inicio de un posible ciclo macro alcista sostenido.";
          } else if (mup.includes('DEATH CROSS') || mup.includes('CRUCE BAJISTA')) {
              finalExpl = "Intersección negativa donde el momentum cortó por debajo de la media histórica, indicando un cambio estructural riesgoso.";
          } else {
              finalExpl = s.explanation || '';
              if (finalExpl.includes('💡')) finalExpl = finalExpl.replace(/💡\s*/g, '');
          }

          allRows += `<div style="padding:10px 14px;margin-bottom:8px;border-left:3px solid ${clr};background:${bg};">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                  <div>
                      <span style="font-weight:800;color:${tc};margin-right:8px;font-size:0.95rem">${t}</span>
                      <span style="font-weight:700;color:#0F172A;font-size:0.85rem">${s.msg.toUpperCase()}</span>
                  </div>
                  <span style="font-weight:800;color:${clr};font-size:0.75rem;white-space:nowrap;margin-left:10px">${icn}</span>
              </div>
              ${finalExpl ? `<div style="font-size:0.75rem; color:#64748b; margin-top:2px;">${finalExpl}</div>` : ''}
          </div>`;
      });
  });

  const totalSigs = sigBuy + sigSell;
  let summary, typeSumm;
  if (totalSigs === 0) {
    summary = `Total pacifismo y llanura del ecosistema (0 registros perversos vs 0 entradas en falso). Literalmente no existen fluctuaciones graves, canales rasgados ni divergencias, sugiriendo un balance de inactividad que no exige tu intromisión.`;
    typeSumm = "neutral";
  } else if (sigBuy > sigSell) {
    summary = `Contundente fiebre alcista generalizada (${sigBuy} registros técnicos propulsivos vs ${sigSell} salidas en falso). Literalmente, las líneas móviles veloces, suelos de bandas y macrodirecciones están resurgiendo como misiles que superan las cúpulas en simultáneo, inyectando flujos masivos de compra en toda la industria.`;
    typeSumm = "positive";
  } else if (sigSell > sigBuy) {
    summary = `Grave predominancia vendedora sistemática (${sigSell} registros perversos técnicos vs ${sigBuy} entradas en falso). Literalmente, las líneas móviles lentas, bandas lognormales altas y macrodirecciones están confluyendo y rompiendo por debajo en varios canales a la vez, advirtiendo salidas de flujos en forma masiva.`;
    typeSumm = "negative";
  } else {
    summary = `Ambiente de colisión algorítmica (${sigBuy} señales compradoras luchando contra ${sigSell} alertas vendedoras en crudo). El ecosistema entero está fragmentado por polarización matemática en corto tiempo. Conviene salvaguardar capital hasta evidenciar la rendición del pulso macroeconómico subyacente.`;
    typeSumm = "warning";
  }

  setContent(`
    <h1 class="header-gradient" style="font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em;">M7 — Puesto de Operaciones Táctica y Transaccional</h1>
    <p class="page-subtitle" style="font-size: 0.95rem; color: #475569;">Algoritmo unificado de escrutinio técnico simultáneo multi-activos evaluando eventos lógicos puros de cruce.</p>

    ${getInsight("📉 Métricas Confluentes Generales de Gatillo Táctico", summary, typeSumm)}

    <div class="card" style="padding:16px; max-width:820px; margin:20px 0;">
        <h3 style="margin-top:0;margin-bottom:16px;color:#0F172A;font-size:0.95rem;font-weight:800;display:flex;align-items:center;gap:6px;">

//  M8 — PORTFOLIO vs. BENCHMARK

function renderM8() {
  const d = getD('benchmark');
  if (!d || !d.Dates) { noData('Benchmark inoperante, sin traza base SP500'); return; }
  const pdx = d.Port; const bdx = d.Bench;

  const outperforming = pdx.Ann_Return > bdx.Ann_Return;
  const safer = pdx.Ann_Volatility < bdx.Ann_Volatility;
  
  let valInsight = "";
  if (outperforming && safer) valInsight = `El portafolio óptimo superó al S&P 500 en retorno (+${pct(pdx.Ann_Return - bdx.Ann_Return,2)} de diferencia anual) y además tuvo menor volatilidad. Esto es el escenario ideal: más ganancia con menos riesgo, lo que valida la diversificación del portafolio construido.`;
  else if (outperforming && !safer) valInsight = `El portafolio generó mayor retorno que el S&P 500 (+${pct(pdx.Ann_Return - bdx.Ann_Return,2)} al año), pero asumiendo más volatilidad. Es un intercambio válido si el inversor está cómodo con mayores fluctuaciones a cambio de mayor rentabilidad potencial.`;
  else if (!outperforming && safer) valInsight = `El portafolio obtuvo menor retorno que el benchmark, pero con menor volatilidad. Actúa como portafolio defensivo: protege mejor en caídas pero crece más lento en mercados alcistas. Útil para perfiles conservadores.`;
  else valInsight = `El portafolio actual rindió por debajo del S&P 500 y con mayor volatilidad. Esto sugiere revisar la composición de activos: la diversificación actual no está compensando adecuadamente el riesgo adicional frente a simplemente indexarse al mercado.`;

  setContent(`
    <h1 class="header-gradient">M8 — Portafolio vs. Benchmark S&P 500</h1>
    <p class="page-subtitle">Comparación del portafolio óptimo (máximo Sharpe) frente al índice S&P 500 como referencia de mercado.</p>

    ${getInsight("Desempeño del Portafolio", "Un portafolio estructurado compite frente a inversiones aburridas (como solo S&P 500). CÓMO LEERLO: Compara las métricas verdes frente al benchmark; si diversificar no te dio victoria, el sufrimiento por la variación no valió la pena.", "neutral")}

    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px,1fr));gap:15px;margin-bottom:20px">
        <div class="card" style="padding:18px;border-top:3px solid ${C.blue}">
            <h3 style="margin:0 0 12px;font-size:0.95rem;color:#0F172A;font-weight:700">Portafolio Óptimo (Máx. Sharpe)</h3>
            ${statRow('Retorno Anual', pct(pdx.Ann_Return), pdx.Ann_Return>0?C.green:C.red)}
            ${statRow('Volatilidad Anual', pct(pdx.Ann_Volatility))}
            ${statRow('Máx. Drawdown', pct(pdx.Max_Drawdown,2), C.red)}
            ${statRow('Sharpe Ratio', fmt(pdx.Sharpe,2), C.blue)}
        </div>
        <div class="card" style="padding:18px;border-top:3px solid #9CA3AF">
            <h3 style="margin:0 0 12px;font-size:0.95rem;color:#0F172A;font-weight:700">Benchmark — S&amp;P 500</h3>
            ${statRow('Retorno Anual', pct(bdx.Ann_Return), bdx.Ann_Return>0?C.green:C.red)}
            ${statRow('Volatilidad Anual', pct(bdx.Ann_Volatility))}
            ${statRow('Máx. Drawdown', pct(bdx.Max_Drawdown,2), C.red)}
            ${statRow('Sharpe Ratio', fmt(bdx.Sharpe,2), C.blue)}
        </div>
        <div class="card" style="padding:18px;background:#f8fafc;border:1px solid #cbd5e1;">
            <h3 style="margin:0 0 12px;font-size:0.95rem;color:#0F172A;font-weight:700">Portafolio vs. Benchmark</h3>
            ${statRow('Alpha de Jensen (Anual)', pct(d.Jensen_Alpha), d.Jensen_Alpha>0?C.green:C.red)}
            ${statRow('Beta del Portafolio', fmt(d.Beta,2))}
            ${statRow('Tracking Error Anual', pct(d.Tracking_Error))}
            ${statRow('Information Ratio', fmt(d.Information_Ratio,2), d.Information_Ratio>0?C.green:C.red)}
            ${statRow('R²', fmt(d.R_Squared,3))}
        </div>
    </div>
    
    <div class="tabs" id="m8-tabs">
      <button class="tab-btn active" onclick="switchTab('m8','cum',this)">📈 Rendimiento Crecimiento Compuesto Vivo</button>
      <button class="tab-btn"        onclick="switchTab('m8','dd',this)">📉 Disminución Traumática Base Drawdown</button>
    </div>
    <div id="m8-tab-cum" class="tab-content card active" style="padding:12px">
        <div id="ch-cum"></div>
        ${(()=>{
          const ir = d.Information_Ratio;
          const te = d.Tracking_Error;
          const alpha = d.Jensen_Alpha;
          const cumGap = d.Port_Cum && d.Bench_Cum ? d.Port_Cum[d.Port_Cum.length-1] - d.Bench_Cum[d.Bench_Cum.length-1] : null;
          let cumText = `Information Ratio: ${fmt(ir,2)} (IR > 0.5 = buena gestión activa; IR > 1.0 = excelente). `;
          cumText += `Tracking Error anual: ${pct(te,2)} — mide cuánto se desvía la trayectoria del portafolio del benchmark. `;
          if (cumGap !== null) cumText += `Diferencial acumulado al final del período: ${cumGap >= 0 ? '+' : ''}${fmt(cumGap,1)} puntos base (portafolio vs. S&P 500 base 100). `;
          cumText += alpha > 0 ? `Alpha de Jensen positivo (${pct(alpha,2)}/año): el portafolio generó retorno adicional por encima del exigido por su beta.` : `Alpha de Jensen negativo (${pct(alpha,2)}/año): el portafolio no compensó adecuadamente el riesgo sistemático asumido.`;
          return getInsight("Rendimiento Compuesto Superior", "Comprueba gráficamente la victoria. CÓMO LEERLO: Si la traza general dista del promedio neutral subiendo de sobremanera significa que has sido mejor inversor gestor frente los esquemas simplistas estándar garantizados.", "neutral");
        })()}
    </div>
    <div id="m8-tab-dd"  class="tab-content card" style="padding:12px">
        <div id="ch-dd"></div>
        ${(()=>{
          const portDD = pdx.Max_Drawdown;
          const benchDD = bdx.Max_Drawdown;
          const ddDiff = portDD - benchDD; // both negative; less negative = smaller drawdown
          let ddText = `Máx. Drawdown portafolio: ${pct(portDD,2)} | Benchmark S&P 500: ${pct(benchDD,2)}. `;
          if (portDD > benchDD) { // less negative = smaller absolute drawdown
            ddText += `El portafolio absorbió caídas ${pct(Math.abs(ddDiff),2)} menores que el benchmark en el peor momento del período, evidenciando un efecto de diversificación efectivo ante shocks sistémicos.`;
          } else {
            ddText += `El portafolio sufrió drawdowns ${pct(Math.abs(ddDiff),2)} más profundos que el benchmark, indicando que la concentración en activos volátiles amplificó las caídas sistémicas en lugar de amortigüarlas.`;
          }
          ddText += ` Sharpe portafolio: ${fmt(pdx.Sharpe,2)} vs. benchmark: ${fmt(bdx.Sharpe,2)}.`;
          return getInsight("Fosas Personales Admisibles (Drawdown)", "CÓMO LEERLO: Las zonas rojas bajo 0 exponen visualmente los meses infartantes completos sufridos aguantando una desvalorización máxima tolerada soportada tras tocar pico y romper el fondo antes de resurgir sanamente por un horizonte verde y prospero.", "neutral");
        })()}
    </div>
    <div class="footer">RiskLab USTA · M8 Desempeño Estratégico</div>`);

  Plotly.newPlot('ch-cum', [
    { type:'scatter', x:d.Dates, y:d.Bench_Cum, name:'S&P 500 (Benchmark)', line:{color:'#9CA3AF', width:2} },
    { type:'scatter', x:d.Dates, y:d.Port_Cum,  name:'Portafolio Óptimo (Máx. Sharpe)', line:{color:C.blue, width:2.5} }
  ], { ...PB, height:380, margin:{t:40,b:40,l:60,r:20},

    yaxis:{...PB.yaxis, title:'Valor Acumulado (Base = 100)'},
    title:{text:'Retorno Acumulado: Portafolio Óptimo vs. S&P 500',font:{size:13}},
    shapes:[{type:'line',xref:'paper',x0:0,x1:1,yref:'y',y0:100,y1:100,line:{color:'#94A3B8',dash:'dot',width:1}}]
  });
  Plotly.newPlot('ch-dd', [
    { type:'scatter', x:d.Dates, y:d.Bench_DD, name:'S&P 500', line:{color:'#9CA3AF', width:1.5}, fill:'tozeroy', fillcolor:'rgba(156,163,175,0.15)' },
    { type:'scatter', x:d.Dates, y:d.Port_DD, name:'Portafolio Óptimo', line:{color:C.red, width:2}, fill:'tozeroy', fillcolor:'rgba(220,38,38,0.15)' }
  ], { ...PB, height:340, margin:{t:40,b:40,l:65,r:20},
    xaxis:{...PB.xaxis, title:''},
    yaxis:{...PB.yaxis, title:'Drawdown (%)', tickformat:'.1%'},
    title:{text:'Drawdown: Portafolio Óptimo vs. S&P 500',font:{size:13}}
  });
}
